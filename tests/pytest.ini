[tool:pytest]
testpaths = tests
python_files = test_*.py integration_*.py
python_classes = Test* *Test
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --durations=10
markers =
    integration: marks tests as integration tests
    api: marks tests as API tests
    storage: marks tests as storage tests
    processing: marks tests as processing tests
    multimodal: marks tests as multimodal tests
    benchmark: marks tests as benchmark tests
    slow: marks tests as slow
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
minversion = 6.0
required_plugins = pytest-cov pytest-xdist