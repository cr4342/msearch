# MSearch 多模态检索系统统一配置文件
# 所有配置项必须在此文件中定义，程序运行时读取

# ============================================
# 系统配置
# ============================================
system:
  name: msearch
  version: 0.1.0
  debug: false
  log_level: INFO
  data_dir: ./data
  temp_dir: ./temp
  # 监控目录列表
  monitored_directories:
    - ./testdata
  # 支持的文件扩展名
  supported_extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .webp
    - .mp4
    - .avi
    - .mov
    - .mp3
    - .wav
    - .flac
    - .txt
  # 文件监控防抖延迟（秒）
  debounce_delay: 0.5
  # 最大工作线程数
  max_workers: 4

# ============================================
# 文件类型配置
# ============================================
file_types:
  # 图像文件扩展名
  image_extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .webp
    - .tiff
    - .tif
    - .svg
    - .heic
    - .heif
    - .ico
  # 视频文件扩展名
  video_extensions:
    - .mp4
    - .avi
    - .mov
    - .mkv
    - .flv
    - .wmv
    - .webm
    - .m4v
    - .mpg
    - .mpeg
    - .3gp
    - .ogv
  # 音频文件扩展名
  audio_extensions:
    - .mp3
    - .wav
    - .flac
    - .aac
    - .ogg
    - .m4a
    - .opus
    - .wma
    - .amr
    - .aiff
    - .au
  # 文本文件扩展名
  text_extensions:
    - .txt
    - .md
    - .json
    - .csv
    - .xml
    - .html
    - .log

# ============================================
# 存储配置
# ============================================
storage:
  data_path: ./data
  models_path: ./data/models
  cache_path: ./cache
  temp_path: ./temp
  max_cache_size: 1073741824  # 1GB
  milvus_path: /data/project/msearch/data/milvus

# ============================================
# 日志配置
# ============================================
logging:
  level: INFO
  file_path: ./logs/msearch.log
  max_bytes: 10485760  # 10MB
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# ============================================
# 数据库配置
# ============================================
database:
  type: sqlite
  path: ./data/msearch.db
  connection_pool_size: 10
  timeout: 30
  max_retries: 3
  retry_delay: 1.0

# ============================================
# 向量数据库配置 (使用 Milvus Lite)
# ============================================
vector_db:
  type: milvus_lite
  data_dir: ./data/milvus
  metric_type: COSINE
  index_type: IVF_FLAT
  nlist: 128
  nprobe: 10
  batch_size: 100
  # 向量搜索默认阈值
  default_score_threshold: 0.7
  # 集合名称配置
  collections:
    visual_vectors: visual_vectors
    audio_music_vectors: audio_music_vectors
    audio_speech_vectors: audio_speech_vectors
    face_vectors: face_vectors
    text_vectors: text_vectors

# ============================================
# 模型配置
# ============================================
models:
  clip:
    path: ./data/models/clip
    model_name: openai/clip-vit-base-patch32
    vector_dim: 512
    local: true
    port: 7997
    device: auto
    max_batch_size: 32
    dtype: float32
  clap:
    path: ./data/models/clap
    model_name: laion/clap-htsat-fused
    vector_dim: 512
    local: true
    port: 7998
    device: auto
    max_batch_size: 16
    dtype: float32
  whisper:
    path: ./data/models/whisper
    model_name: openai/whisper-base
    vector_dim: 512
    local: true
    port: 7999
    device: auto
    max_batch_size: 8
    dtype: float32
  facenet:
    path: ./data/models/facenet
    model_name: facenet-pytorch
    vector_dim: 512
    local: true
    device: auto

# ============================================
# Infinity服务配置
# ============================================
infinity:
  host: localhost
  port: 7997
  timeout: 30
  # 服务启动等待时间（秒）
  startup_wait_time: 5
  # 服务关闭超时时间（秒）
  shutdown_timeout: 10
  # 健康检查配置
  health_check:
    interval: 30
    failure_threshold: 3
    timeout: 5
  # 资源监控配置
  resource_monitor:
    interval: 60
    gpu_threshold: 0.9
    memory_threshold: 0.85
    auto_cleanup: true

# ============================================
# API配置
# ============================================
api:
  host: 0.0.0.0
  port: 8000
  workers: 4
  debug: false
  timeout: 30
  enable_cors: true
  # 健康检查超时时间（秒）
  health_check_timeout: 5
  # 推理测试超时时间（秒）
  inference_timeout: 10

# ============================================
# 性能优化配置
# ============================================
performance:
  monitoring_interval: 5
  max_history_size: 1000
  alerts:
    cpu_threshold: 80.0
    memory_threshold: 85.0
    disk_threshold: 90.0
  batch_processing:
    enabled: true
    max_batch_size: 32
    batch_timeout: 1.0
    max_workers: 4
    use_multiprocessing: false
  # GPU内存清理阈值
  gpu_memory_threshold: 0.9
  # 系统内存清理阈值
  memory_threshold: 0.85

# ============================================
# 缓存配置
# ============================================
cache:
  memory:
    max_size: 1000
    ttl: 3600  # 1小时
  disk:
    directory: ./data/cache
    ttl: 86400  # 24小时
  vector:
    max_size: 10000
  strategies:
    embedding:
      type: vector
      ttl: 86400  # 24小时
    preprocessing:
      type: memory
      ttl: 3600   # 1小时
    metadata:
      type: disk
      ttl: 86400  # 24小时
    query:
      type: memory
      ttl: 300    # 5分钟

# ============================================
# 媒体处理配置
# ============================================
media_processing:
  max_workers: 4
  batch_size: 10
  timeout: 300
  enable_scene_detection: true
  enable_face_detection: false
  enable_audio_separation: true
  # 图像处理配置
  image:
    target_resolution: 720  # 目标分辨率（高度）
    max_size_bytes: 10485760  # 10MB
    quality: 85
  # 视频处理配置
  video:
    max_resolution: 960  # 短边最大像素
    target_fps: 8
    codec: h264
    # 场景检测配置
    scene_detection:
      enabled: true
      threshold: 0.15  # 场景检测阈值
      min_scene_length: 30  # 最小场景长度（秒）
      max_scene_length: 120  # 最大场景长度（秒）
      max_segment_duration: 5  # 最大片段时长（秒）
    # 关键帧配置
    keyframe:
      interval: 2.0  # 关键帧间隔（秒）
      quality: 2  # JPEG质量
    # 音频分离配置
    audio_separation:
      enabled: true
      sample_rate: 16000
      channels: 1
      codec: pcm_s16le
  # 音频处理配置
  audio:
    sample_rate: 48000
    channels: 1
    bitrate: 64000
    codec: aac
    # 质量过滤配置
    quality_filter:
      min_duration: 3.0  # 最小音频片段长度（秒）
      min_snr_ratio: 5.0  # 最小信噪比
      enable_silence_detection: true
    # 格式转换配置
    format_conversion:
      enabled: true
      target_sample_rate: 16000
      target_channels: 1
      target_codec: pcm_s16le
  # FFmpeg配置
  ffmpeg:
    timeout: 60  # FFmpeg命令超时时间（秒）
    temp_dir: ./temp/ffmpeg

# ============================================
# 时间戳处理配置
# ============================================
timestamp_processing:
  # 场景检测阈值
  scene_detection_threshold: 0.15
  # 关键帧间隔（秒）
  keyframe_interval: 2.0
  # 精度要求（秒）
  precision_requirement: 2.0
  # 容差范围（秒）
  tolerance_range: 4.0

# ============================================
# 人脸识别配置
# ============================================
face_recognition:
  enabled: true
  model: facenet
  detector: mtcnn
  detection:
    min_face_size: 40
    confidence_threshold: 0.9
    nms_threshold: 0.4
  feature_extraction:
    vector_dim: 512
    normalize: true
  matching:
    similarity_threshold: 0.6
    enable_fuzzy_matching: true
    fuzzy_threshold: 0.8
    max_matches: 10
  indexing:
    video_sample_interval: 5
    batch_size: 16
    enable_clustering: false

# ============================================
# 智能检索配置
# ============================================
smart_retrieval:
  # 默认权重配置
  default_weights:
    clip: 0.4
    clap: 0.3
    whisper: 0.3
  # 人名检索权重
  person_weights:
    clip: 0.5
    clap: 0.25
    whisper: 0.25
  # 音频检索权重
  audio_weights:
    music:
      clip: 0.2
      clap: 0.7
      whisper: 0.1
    speech:
      clip: 0.2
      clap: 0.1
      whisper: 0.7
  # 视觉检索权重
  visual_weights:
    clip: 0.7
    clap: 0.15
    whisper: 0.15
  # 检索阈值配置
  score_thresholds:
    default: 0.5
    strict: 0.7
    relaxed: 0.3
  # 关键词识别配置
  keywords:
    music:
      - 音乐
      - 歌曲
      - MV
      - 音乐视频
      - 歌
      - 曲子
      - 旋律
      - 节拍
    speech:
      - 讲话
      - 演讲
      - 会议
      - 访谈
      - 对话
      - 发言
      - 语音
    visual:
      - 画面
      - 场景
      - 图像
      - 图片
      - 视频画面
      - 截图

# ============================================
# 调度器配置
# ============================================
orchestrator:
  check_interval: 5.0
  max_concurrent_tasks: 3

# ============================================
# 任务管理器配置
# ============================================
task_management:
  max_retries: 5
  retry_delay: 1  # 秒
  retry_multiplier: 2  # 重试倍数
  task_timeout: 3600  # 秒
  # 重试循环检查间隔
  retry_check_interval: 1
  # 任务清理保留天数
  cleanup_retention_days: 30
  # 获取待处理任务限制
  pending_task_limit: 10

# ============================================
# 重试配置
# ============================================
retry:
  # 最大重试次数
  max_attempts: 3
  # 初始延迟（秒）
  initial_delay: 0.5
  # 退避倍数
  backoff_multiplier: 2.0
  # 最大延迟（秒）
  max_delay: 60.0
  # 指数退避策略
  exponential_backoff: true
  # 固定间隔策略
  fixed_interval: false

# ============================================
# 批处理配置
# ============================================
batch_processing:
  # 批处理超时时间（秒）
  timeout: 1.0
  # 最大工作线程数
  max_workers: 4
  # 批处理大小
  batch_size: 32

# ============================================
# 负载均衡器配置
# ============================================
load_balancer:
  # 服务端口配置
  service_ports:
    clip: 7997
    clap: 7998
    whisper: 7999

# ============================================
# 性能监控配置
# ============================================
performance_monitor:
  # 监控间隔（秒）
  monitoring_interval: 5
  # 最大历史记录数
  max_history_size: 1000
  # 告警阈值
  alerts:
    cpu_threshold: 80.0
    memory_threshold: 85.0
    disk_threshold: 90.0
  # 性能历史记录数
  performance_history_size: 100
  # 组件性能收集启用
  enable_component_metrics: true

# ============================================
# 模型下载配置
# ============================================
model_download:
  hf_endpoint: https://hf-mirror.com
  timeout: 300
  max_retries: 3
  local_first: true
  model_load_timeout: 60
  device: auto

# ============================================
# 音频分类配置
# ============================================
audio_classification:
  # VAD引擎
  vad_engine: smn
  # 性别检测
  detect_gender: false
  # 音频类型
  audio_types:
    speech: speech
    music: music
    noise: noEnergy

# ============================================
# 临时文件配置
# ============================================
temp_files:
  # 临时目录
  temp_dir: ./temp
  # 临时文件过期时间（秒）
  expiry_time: 3600
  # 清理间隔（秒）
  cleanup_interval: 300

# ============================================
# 错误处理配置
# ============================================
error_handling:
  # 错误码模块映射
  modules:
    general: "001"
    vector: "002"
    database: "003"
    media: "004"
    api: "005"
  # 超时错误码
  timeout: "007"