# msearch 多模态检索系统配置文件

# 系统配置
system:
  log_level: INFO
  data_dir: ./data
  temp_dir: ./temp
  monitored_directories:
    - /testdata
  supported_extensions:
    - .jpg
    - .jpeg
    - .png
    - .bmp
    - .webp
    - .mp4
    - .avi
    - .mov
    - .mp3
    - .wav
    - .flac
  debounce_delay: 0.5
  max_workers: 4

# 性能优化配置
performance:
  # 监控配置
  monitoring_interval: 5
  max_history_size: 1000
  
  # 告警阈值
  alerts:
    cpu_threshold: 80.0
    memory_threshold: 85.0
    disk_threshold: 90.0
  
  # 批处理优化
  batch_processing:
    enabled: true
    max_batch_size: 32
    batch_timeout: 1.0
    max_workers: 4
    use_multiprocessing: false

# 缓存配置
cache:
  memory:
    max_size: 1000
    ttl: 3600  # 1小时
  disk:
    directory: "./data/cache"
    ttl: 86400  # 24小时
  vector:
    max_size: 10000
  # 缓存策略
  strategies:
    embedding:
      type: "vector"
      ttl: 86400  # 24小时
    preprocessing:
      type: "memory"
      ttl: 3600   # 1小时
    metadata:
      type: "disk"
      ttl: 86400  # 24小时
    query:
      type: "memory"
      ttl: 300    # 5分钟

# 数据库配置
database:
  sqlite:
    path: ./data/msearch.db
    connection_pool_size: 10
    timeout: 30
  qdrant:
    host: localhost
    port: 6333
    timeout: 30
    collections:
      visual_vectors: visual_vectors
      audio_music_vectors: audio_music_vectors
      audio_speech_vectors: audio_speech_vectors
      face_vectors: face_vectors
      text_vectors: text_vectors
    # 向量存储配置
    vector_storage:
      # 默认向量维度
      default_dimensions:
        visual: 512
        audio_music: 512
        audio_speech: 512
        face: 512
        text: 512
      
      # 搜索配置
      search:
        # 默认搜索限制
        default_limit: 20
        # 最大搜索限制
        max_limit: 1000
        # 默认相似度阈值
        default_score_threshold: 0.7
        # 批量操作大小
        batch_size: 100
      
      # 集合配置
      collections:
        visual_vectors:
          name: "视觉向量集合"
          description: "用于图像和视频检索的向量集合"
          distance: "Cosine"
          hnsw:
            m: 16
            ef_construct: 200
            ef_search: 64
        
        audio_music_vectors:
          name: "音频音乐向量集合"
          description: "用于音乐检索的向量集合"
          distance: "Cosine"
          hnsw:
            m: 16
            ef_construct: 200
            ef_search: 64
        
        audio_speech_vectors:
          name: "音频语音向量集合"
          description: "用于语音检索的向量集合"
          distance: "Cosine"
          hnsw:
            m: 16
            ef_construct: 200
            ef_search: 64
        
        face_vectors:
          name: "人脸向量集合"
          description: "用于人脸识别和检索的向量集合"
          distance: "Cosine"
          hnsw:
            m: 16
            ef_construct: 200
            ef_search: 64
        
        text_vectors:
          name: "文本向量集合"
          description: "用于文本检索的向量集合"
          distance: "Cosine"
          hnsw:
            m: 16
            ef_construct: 200
            ef_search: 64

# Infinity服务配置
infinity:
  services:
    clip:
      model_id: openai/clip-vit-base-patch32
      port: 7997
      device: cuda:0
      max_batch_size: 32
      dtype: float16
    clap:
      model_id: laion/clap-htsat-fused
      port: 7998
      device: cuda:0
      max_batch_size: 16
      dtype: float16
    whisper:
      model_id: openai/whisper-base
      port: 7999
      device: cuda:1
      max_batch_size: 8
      dtype: float16
  health_check:
    interval: 30
    failure_threshold: 3
    timeout: 5
  resource_monitor:
    interval: 60
    gpu_threshold: 0.9
    memory_threshold: 0.85
    auto_cleanup: true

# 媒体处理配置
media_processing:
  video:
    max_resolution: 960
    target_fps: 8
    codec: h264
    scene_detection:
      enabled: true
      threshold: 30.0
      min_scene_length: 30
      max_scene_length: 120
  audio:
    sample_rate: 16000
    channels: 1
    bitrate: 64000
    codec: aac
    quality_filter:
      min_duration: 3.0
      min_snr_ratio: 5.0
      enable_silence_detection: true

# 人脸识别配置
face_recognition:
  enabled: true
  model: facenet
  detector: mtcnn
  detection:
    min_face_size: 40
    confidence_threshold: 0.9
    nms_threshold: 0.4
  feature_extraction:
    vector_dim: 512
    normalize: true
  matching:
    similarity_threshold: 0.6
    enable_fuzzy_matching: true
    fuzzy_threshold: 0.8
    max_matches: 10
  indexing:
    video_sample_interval: 5
    batch_size: 16
    enable_clustering: false

# 智能检索配置
smart_retrieval:
  default_weights:
    clip: 0.4
    clap: 0.3
    whisper: 0.3
  person_weights:
    clip: 0.5
    clap: 0.25
    whisper: 0.25
  audio_weights:
    music:
      clip: 0.2
      clap: 0.7
      whisper: 0.1
    speech:
      clip: 0.2
      clap: 0.1
      whisper: 0.7
  visual_weights:
    clip: 0.7
    clap: 0.15
    whisper: 0.15
  keywords:
    music:
      - 音乐
      - 歌曲
      - MV
      - 音乐视频
      - 歌
      - 曲子
      - 旋律
      - 节拍
    speech:
      - 讲话
      - 演讲
      - 会议
      - 访谈
      - 对话
      - 发言
      - 语音
    visual:
      - 画面
      - 场景
      - 图像
      - 图片
      - 视频画面
      - 截图

# 调度器配置
orchestrator:
  check_interval: 5.0
  max_concurrent_tasks: 3

# 任务管理器配置
task_manager:
  max_retry_attempts: 3
  retry_delay: 60
  task_timeout: 3600

# Qdrant服务配置
qdrant_service:
  # 启动模式: binary(二进制) 或 docker
  startup_mode: binary
  
  # 二进制文件配置
  binary:
    # 版本
    version: "v1.7.0"
    # 下载URL模板
    download_url_template: "https://github.com/qdrant/qdrant/releases/download/{version}/{binary_name}"
    # 本地存储路径
    storage_path: "./data/qdrant/bin"
    # 自动下载
    auto_download: true
  
  # Docker配置
  docker:
    # 容器名称
    container_name: "msearch-qdrant"
    # 镜像版本
    image: "qdrant/qdrant:latest"
    # 重启策略
    restart_policy: "unless-stopped"
    # 端口映射
    port_mappings:
      http: "6333:6333"
      grpc: "6334:6334"
    # 卷映射
    volume_mappings:
      storage: "./data/qdrant:/qdrant/storage"
  
  # 服务健康检查
  health_check:
    # 健康检查间隔（秒）
    interval: 5
    # 启动超时（秒）
    startup_timeout: 30
    # 健康检查URL
    url: "http://{host}:{port}/health"
  
  # 监控配置
  monitoring:
    # 启用监控
    enabled: true
    # 指标收集间隔（秒）
    metrics_interval: 60
    # 日志收集
    collect_logs: true
    # 性能监控
    performance_monitoring: true