# Qdrant 配置文件
# 用于单机部署的Qdrant向量数据库

# 服务配置
service:
  host: "localhost"
  port: 6333
  grpc_port: 6334
  timeout: 30
  
# 存储配置
storage:
  # 数据存储路径
  path: "./data/qdrant"
  
  # 性能配置
  performance:
    # 最大搜索结果数
    max_search_results: 1000
    
    # 搜索并行度
    search_parallelism: 4
    
    # 更新并行度
    update_parallelism: 2
    
    # 预分配向量数量
    prealloc_vectors: 100000
  
  # WAL（Write-Ahead Log）配置
  wal:
    # WAL容量限制 (MB)
    capacity_mb: 256
    
    # WAL段大小 (MB)
    segment_size_mb: 64
    
    # WAL压缩阈值
    compression_threshold: 10000
  
  # 向量存储配置
  vectors:
    # HNSW算法参数
    hnsw:
      # 构建时的连接数
      m: 16
      
      # 搜索时的候选数
      ef_construct: 200
      
      # 搜索时的候选数
      ef_search: 64
      
      # 全连接阈值
      full_scan_threshold: 10000

# 集合配置
collections:
  # 视觉向量集合（图像、视频）
  visual_vectors:
    name: "visual_vectors"
    vector_size: 512
    distance: "Cosine"
    description: "视觉向量集合，用于图像和视频检索"
    
    # 集合参数
    hnsw:
      m: 16
      ef_construct: 200
      ef_search: 64
    
    # 有效载荷配置
    payload_schema:
      file_id: "keyword"
      file_path: "keyword"
      file_name: "text"
      file_type: "keyword"
      file_size: "integer"
      created_at: "float"
      segment_id: "keyword"
      start_time: "float"
      end_time: "float"
      duration: "float"
      confidence: "float"
      model_name: "keyword"
  
  # 音频音乐向量集合
  audio_music_vectors:
    name: "audio_music_vectors"
    vector_size: 512
    distance: "Cosine"
    description: "音频音乐向量集合，用于音乐检索"
    
    hnsw:
      m: 16
      ef_construct: 200
      ef_search: 64
    
    payload_schema:
      file_id: "keyword"
      file_path: "keyword"
      file_name: "text"
      file_type: "keyword"
      file_size: "integer"
      created_at: "float"
      segment_id: "keyword"
      start_time: "float"
      end_time: "float"
      duration: "float"
      confidence: "float"
      model_name: "keyword"
  
  # 音频语音向量集合
  audio_speech_vectors:
    name: "audio_speech_vectors"
    vector_size: 512
    distance: "Cosine"
    description: "音频语音向量集合，用于语音检索"
    
    hnsw:
      m: 16
      ef_construct: 200
      ef_search: 64
    
    payload_schema:
      file_id: "keyword"
      file_path: "keyword"
      file_name: "text"
      file_type: "keyword"
      file_size: "integer"
      created_at: "float"
      segment_id: "keyword"
      start_time: "float"
      end_time: "float"
      duration: "float"
      confidence: "float"
      model_name: "keyword"
      transcription: "text"
  
  # 人脸向量集合
  face_vectors:
    name: "face_vectors"
    vector_size: 512
    distance: "Cosine"
    description: "人脸向量集合，用于人脸识别和检索"
    
    hnsw:
      m: 16
      ef_construct: 200
      ef_search: 64
    
    payload_schema:
      file_id: "keyword"
      file_path: "keyword"
      file_name: "text"
      file_type: "keyword"
      file_size: "integer"
      created_at: "float"
      segment_id: "keyword"
      start_time: "float"
      end_time: "float"
      duration: "float"
      confidence: "float"
      model_name: "keyword"
      person_id: "keyword"
      person_name: "text"

# 日志配置
logging:
  # 日志级别: DEBUG, INFO, WARN, ERROR
  level: "INFO"
  
  # 日志格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # 日志文件配置
  file:
    # 日志文件路径
    path: "./logs/qdrant.log"
    
    # 日志文件大小限制 (MB)
    max_size_mb: 100
    
    # 保留的日志文件数量
    max_files: 5
    
    # 是否输出到控制台
    console: true

# 监控配置
monitoring:
  # 启用Prometheus指标
  enable_prometheus: true
  
  # Prometheus指标端口
  prometheus_port: 6335
  
  # 启用健康检查端点
  enable_health_check: true
  
  # 健康检查端口
  health_check_port: 6333

# 安全配置
security:
  # 启用API密钥认证
  enable_api_key: false
  
  # API密钥 (如果启用)
  api_key: ""
  
  # 允许的CORS源
  cors:
    allow_origins: ["*"]
    allow_methods: ["GET", "POST", "PUT", "DELETE"]
    allow_headers: ["*"]

# 集群配置（单机版不需要）
cluster:
  # 是否启用集群模式
  enabled: false
  
  # 节点ID
  node_id: "qdrant-single"
  
  # 其他节点地址
  peers: []

# 快照配置
snapshots:
  # 启用自动快照
  auto_snapshot: true
  
  # 快照间隔 (小时)
  interval_hours: 24
  
  # 快照保留数量
  max_snapshots: 7
  
  # 快照存储路径
  storage_path: "./data/qdrant/snapshots"

# 备份配置
backup:
  # 启用自动备份
  auto_backup: false
  
  # 备份间隔 (天)
  interval_days: 7
  
  # 备份保留数量
  max_backups: 4
  
  # 备份存储路径
  storage_path: "./data/qdrant/backups"